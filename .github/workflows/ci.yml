name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sdk:
    name: SDK workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm run validate

      - name: Package dry run
        run: pnpm pack:dry-run
