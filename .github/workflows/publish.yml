name: Publish Packages

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish with --dry-run"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  publish:
    name: Publish public SDK packages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/sdk-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm run validate

      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        # REVIEW: `npm publish` does not rewrite `workspace:*` dependencies the way `pnpm publish`
        # does. The SDK/provider/testing package manifests currently depend on
        # `@globalpayto/protocol: workspace:*`; verify the packed manifests replace those with real
        # semver ranges before using this workflow for public npm releases.
        run: pnpm -r --filter './packages/*' exec npm publish --dry-run --access public

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/sdk-v') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required to publish packages."
            exit 1
          fi
          # REVIEW: Same workspace-dependency concern as the dry run above. Prefer `pnpm -r publish`
          # or add a tarball inspection step that fails if any published package.json still contains
          # `workspace:*`, otherwise downstream npm consumers may receive uninstallable packages.
          pnpm -r --filter './packages/*' exec npm publish --access public
