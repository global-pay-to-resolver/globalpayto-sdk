openapi: 3.1.0
info:
  title: MyPayTag Public API
  version: 0.1.0
  summary: Public resolver contracts for sending apps and receiving apps.
  description: |
    MyPayTag lets sending apps resolve a user paytag into a one-time payment
    intent, while receiving apps register supported routes and create dynamic
    provider intents only after selection.

    This public OpenAPI document describes integration-facing contracts only.
    It does not expose private resolver storage, deployment wiring, audit
    internals, admin APIs, service-role behavior, or provider credentials.
  contact:
    name: MyPayTag
    url: https://mypaytag.com
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: http://localhost:54321/functions/v1
    description: Local Supabase functions
  - url: https://staging-api.mypaytag.com/functions/v1
    description: Staging API
  - url: https://api.mypaytag.com/functions/v1
    description: Production API
tags:
  - name: Health
    description: Availability checks.
  - name: Resolve
    description: Sending-app payment resolution.
  - name: Routes
    description: Receiving-app route registration.
  - name: Hosted Actions
    description: Browser-safe action hydration and completion.
  - name: Notifications
    description: Cubid comms notification event payloads.
security:
  - MyPayTagSignature: []
paths:
  /health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Check API availability.
      security: []
      responses:
        "200":
          description: API is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    service: mypaytag-api
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /resolve:
    post:
      tags:
        - Resolve
      operationId: resolvePayment
      summary: Resolve a paytag into a payment intent or safe next action.
      description: |
        Sending apps submit a paytag or opaque paytag reference, supported payment
        paths, amount, purpose, and reconciliation reference. The response is a
        resolved one-time MyPayTag intent, a hosted action, or a public safe
        status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRequest"
            examples:
              baseUsdcPayout:
                summary: Base USDC payout
                value:
                  recipient:
                    identifierType: paytag
                    identifier: abd123@cubid.mypaytag
                  supportedPaths:
                    - chain: base
                      network: mainnet
                      asset: USDC
                  amount:
                    value: "25.00"
                    currency: USDC
                  purpose: payout
                  intentMode: one_time
                  payingDappReference: sender:payout_987
      responses:
        "200":
          description: Public resolver outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveResponse"
              examples:
                resolved:
                  summary: Resolved payment intent
                  value:
                    status: resolved
                    intent:
                      id: mpt_pi_123
                      schema: mypaytag.intent.v1
                      status: ready
                      modality: provider_intent
                      recipient:
                        identifierType: paytag
                        identifierHash: sha256:example
                      selectedRoute:
                        payToDappId: example-wallet
                        chain: base
                        network: mainnet
                        asset: USDC
                      amount:
                        value: "25.00"
                        currency: USDC
                      expiresAt: "2026-06-24T20:00:00Z"
                      singleUse: true
                      paymentInstruction:
                        type: provider_json
                        provider: example-wallet
                        payload:
                          providerIntentId: provider_pi_456
                          resolverReference: mpt_req_123
                          payingDappId: sender
                          payingDappReference: sender:payout_987
                          chain: base
                          network: mainnet
                          asset: USDC
                          destination:
                            kind: blockchain_address
                            recipientAddress: "0xabc0000000000000000000000000000000000000"
                          amount: "25.00"
                          purpose: payout
                          reference: example-wallet:provider_pi_456
                          expiresAt: "2026-06-24T20:00:00Z"
                      references:
                        resolverReference: mpt_pi_123
                        providerReference: provider_pi_456
                        payingDappReference: sender:payout_987
                actionRequired:
                  summary: User route selection required
                  value:
                    status: user_action_required
                    action:
                      type: route_selection
                      url: https://mypaytag.com/actions/route-selection/mpt_act_123
                      expiresAt: "2026-06-24T20:00:00Z"
                noRoute:
                  summary: Safe no-route response
                  value:
                    status: no_route
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /payto-routes:
    get:
      tags:
        - Routes
      operationId: listPayToRoutes
      summary: List receiving-app routes scoped to the authenticated app.
      responses:
        "200":
          description: Scoped route list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteListResponse"
              examples:
                routes:
                  value:
                    status: resolved
                    routes:
                      - id: mpt_route_123
                        payToDappId: example-wallet
                        chain: base
                        network: mainnet
                        asset: USDC
                        state: active
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Routes
      operationId: createPayToRoutes
      summary: Register supported receive routes for a receiving app.
      description: |
        Receiving apps register route availability for a signed-in user.
        Registration must not include wallet addresses, accounts, memos,
        payment links, or chain-specific payment instructions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRegistrationRequest"
            examples:
              smartrustBaseUsdc:
                summary: Register Base USDC support
                value:
                  recipient:
                    identifierType: paytag
                    identifier: abd123@cubid.mypaytag
                  payToDappId: example-wallet
                  supportedRoutes:
                    - chain: base
                      network: mainnet
                      asset: USDC
                  authorizationToken: mpt_auth_123
      responses:
        "200":
          description: Route registration outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteRegistrationResponse"
              examples:
                registered:
                  value:
                    status: resolved
                    routes:
                      - id: mpt_route_123
                        payToDappId: example-wallet
                        chain: base
                        network: mainnet
                        asset: USDC
                        state: active
                routeSelectionRequired:
                  value:
                    status: user_action_required
                    action:
                      type: route_selection
                      url: https://mypaytag.com/actions/route-selection/mpt_act_123
                      expiresAt: "2026-06-24T20:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /payto-routes/{routeId}:
    get:
      tags:
        - Routes
      operationId: getPayToRoute
      summary: Read a receiving-app route scoped to the authenticated app.
      parameters:
        - $ref: "#/components/parameters/RouteId"
      responses:
        "200":
          description: Route details scoped to the authenticated app.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteReadResponse"
              examples:
                route:
                  value:
                    status: resolved
                    route:
                      id: mpt_route_123
                      payToDappId: example-wallet
                      chain: base
                      network: mainnet
                      asset: USDC
                      state: active
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Routes
      operationId: updatePayToRoute
      summary: Update a receiving-app route.
      parameters:
        - $ref: "#/components/parameters/RouteId"
      requestBody:
        required: true
        content:
          application/json:
              schema:
                $ref: "#/components/schemas/RouteUpdateRequest"
              examples:
                disableRoute:
                  value:
                    state: disabled
      responses:
        "200":
          description: Updated route.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteReadResponse"
              examples:
                route:
                  value:
                    status: resolved
                    route:
                      id: mpt_route_123
                      payToDappId: example-wallet
                      chain: base
                      network: mainnet
                      asset: USDC
                      state: disabled
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Routes
      operationId: deletePayToRoute
      summary: Revoke a receiving-app route.
      parameters:
        - $ref: "#/components/parameters/RouteId"
      responses:
        "200":
          description: Route revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteDeleteResponse"
              examples:
                revoked:
                  value:
                    status: revoked
                    routeId: mpt_route_123
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /hosted-actions/{actionId}:
    get:
      tags:
        - Hosted Actions
      operationId: getHostedAction
      summary: Hydrate a browser-safe hosted action view model.
      description: |
        Hosted action URLs are opaque and short-lived. Details are hydrated only
        after action validation and signed-in user context checks.
      parameters:
        - $ref: "#/components/parameters/ActionId"
      responses:
        "200":
          description: Browser-safe hosted action view model.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedActionView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Hosted Actions
      operationId: completeHostedAction
      summary: Complete a hosted action decision.
      parameters:
        - $ref: "#/components/parameters/ActionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostedActionDecision"
      responses:
        "200":
          description: Completion state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedActionCompletion"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /notifications:
    post:
      tags:
        - Notifications
      operationId: receiveNotificationEvent
      summary: Accept an MVP notification event payload.
      description: |
        MVP notification delivery uses Cubid comms. The only MVP event is
        payment_intent_created. Do not use payment-received language unless a
        future provider receipt callback contract exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationEvent"
            examples:
              paymentIntentCreated:
                value:
                  eventType: payment_intent_created
                  schema: mypaytag.notification.v1
                  recipient:
                    identifierType: paytag
                    maskedDisplay: r***@example.com
                  amount:
                    value: "25.00"
                    currency: USDC
                  references:
                    resolverReference: mpt_req_123
                    providerReference: provider_pi_456
                    payingDappReference: sender:payout_987
                  action:
                    type: none
      responses:
        "202":
          description: Notification accepted for delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
webhooks:
  providerPaymentIntent:
    post:
      tags:
        - Routes
      operationId: createProviderPaymentIntent
      summary: Receiving-app provider intent callback.
      description: |
        MyPayTag calls the receiving app's registered intent endpoint after the
        route has been selected. Receiving apps return a typed provider_json
        instruction for this one payment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderCallbackRequest"
            examples:
              providerCallback:
                value:
                  resolverRequestId: mpt_req_123
                  recipient:
                    identifierType: paytag
                    paytagReference: paytag_ref_abc
                  payingDappId: chaincrew
                  payingDappReference: chaincrew:payout_987
                  selectedPath:
                    chain: base
                    network: mainnet
                    asset: USDC
                  amount:
                    value: "25.00"
                    currency: USDC
                  purpose: payout
                  expiresAt: "2026-06-24T20:00:00Z"
      responses:
        "200":
          description: Provider intent response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderResponse"
              examples:
                providerResponse:
                  value:
                    providerIntentId: st_pi_456
                    status: ready
                    paymentInstruction:
                      type: provider_json
                      provider: smartrust-wallet
                      payload:
                        providerIntentId: st_pi_456
                        resolverReference: mpt_req_123
                        payingDappId: chaincrew
                        payingDappReference: chaincrew:payout_987
                        chain: base
                        network: mainnet
                        asset: USDC
                        destination:
                          kind: blockchain_address
                          recipientAddress: "0xabc0000000000000000000000000000000000000"
                        amount: "25.00"
                        purpose: payout
                        reference: smartrust:st_pi_456
                        expiresAt: "2026-06-24T20:00:00Z"
components:
  responses:
    BadRequest:
      description: Invalid public request shape or unsupported request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid app authentication signature.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource unavailable or not visible to the authenticated app.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Request throttled.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service temporarily unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  securitySchemes:
    MyPayTagSignature:
      type: apiKey
      in: header
      name: x-mypaytag-signature
      description: |
        App-authenticated requests include x-mypaytag-dapp-id,
        x-mypaytag-timestamp, x-mypaytag-nonce, and x-mypaytag-signature.
        The signature binds app identity, timestamp, nonce, method, path, and
        request body.
  parameters:
    RouteId:
      name: routeId
      in: path
      required: true
      schema:
        type: string
        pattern: "^mpt_route_[A-Za-z0-9_-]+$"
    ActionId:
      name: actionId
      in: path
      required: true
      schema:
        type: string
        pattern: "^mpt_act_[A-Za-z0-9_-]+$"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: mypaytag-api
    PublicStatus:
      type: string
      enum:
        - resolved
        - no_route
        - user_action_required
        - authorization_required
        - unsupported_path
        - provider_unavailable
        - provider_error
        - expired_authorization
        - revoked_authorization
        - invalid_identifier
        - invalid_request
    Recipient:
      type: object
      additionalProperties: false
      required:
        - identifierType
        - identifier
      properties:
        identifierType:
          type: string
          const: paytag
        identifier:
          type: string
          examples:
            - abd123@cubid.mypaytag
            - "+1234569999@phone.cubid.mypaytag"
    RecipientAlias:
      type: object
      additionalProperties: false
      required:
        - identifierType
        - paytagReference
      properties:
        identifierType:
          type: string
          const: paytag
        paytagReference:
          type: string
          description: MyPayTag server-side paytag reference for the selected provider callback.
    RoutePath:
      type: object
      additionalProperties: false
      required:
        - chain
        - network
        - asset
      properties:
        chain:
          type: string
          examples:
            - base
            - ethereum
            - solana
        network:
          type: string
          examples:
            - mainnet
            - sepolia
        asset:
          type: string
          examples:
            - USDC
            - USDT
    Amount:
      type: object
      additionalProperties: false
      required:
        - value
        - currency
      properties:
        value:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
        currency:
          type: string
    ResolveRequest:
      type: object
      additionalProperties: false
      required:
        - recipient
        - supportedPaths
        - amount
        - purpose
        - intentMode
        - payingDappReference
      properties:
        recipient:
          $ref: "#/components/schemas/Recipient"
        supportedPaths:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RoutePath"
        amount:
          $ref: "#/components/schemas/Amount"
        purpose:
          type: string
          minLength: 1
        intentMode:
          type: string
          const: one_time
        payingDappReference:
          type: string
          minLength: 1
        preferredSolverId:
          $ref: "#/components/schemas/SolverId"
    ResolveResponse:
      oneOf:
        - $ref: "#/components/schemas/ResolvedIntentResponse"
        - $ref: "#/components/schemas/ActionRequiredResponse"
        - type: object
          additionalProperties: false
          required:
            - status
          properties:
            status:
              type: string
              enum:
                - no_route
                - provider_unavailable
    ResolvedIntentResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - intent
      properties:
        status:
          type: string
          const: resolved
        intent:
          $ref: "#/components/schemas/MyPayTagIntent"
    ActionRequiredResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - action
      properties:
        status:
          type: string
          const: user_action_required
        action:
          $ref: "#/components/schemas/HostedAction"
    StatusOnlyResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/PublicStatus"
    HostedAction:
      type: object
      additionalProperties: false
      required:
        - type
        - url
        - expiresAt
      properties:
        type:
          type: string
          enum:
            - route_selection
        url:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        recipientAddress: false
        address: false
        account: false
    MyPayTagIntent:
      type: object
      additionalProperties: false
      required:
        - id
        - schema
        - status
        - modality
        - recipient
        - selectedRoute
        - amount
        - expiresAt
        - singleUse
        - paymentInstruction
        - references
      properties:
        id:
          type: string
          minLength: 1
        schema:
          type: string
          const: mypaytag.intent.v1
        status:
          type: string
          const: ready
        modality:
          type: string
          const: provider_intent
        recipient:
          $ref: "#/components/schemas/IntentRecipient"
        selectedRoute:
          $ref: "#/components/schemas/SelectedRoute"
        amount:
          $ref: "#/components/schemas/Amount"
        expiresAt:
          type: string
          format: date-time
        singleUse:
          type: boolean
          const: true
        paymentInstruction:
          $ref: "#/components/schemas/PaymentInstruction"
        references:
          $ref: "#/components/schemas/IntentReferences"
    IntentRecipient:
      type: object
      additionalProperties: false
      required:
        - identifierType
        - identifierHash
      properties:
        identifierType:
          type: string
          const: paytag
        identifierHash:
          type: string
          minLength: 1
    SelectedRoute:
      type: object
      additionalProperties: false
      required:
        - payToDappId
        - chain
        - network
        - asset
      properties:
        payToDappId:
          type: string
          minLength: 1
        chain:
          type: string
          minLength: 1
        network:
          type: string
          minLength: 1
        asset:
          type: string
          minLength: 1
    PaymentInstruction:
      type: object
      additionalProperties: false
      required:
        - type
        - provider
        - payload
      properties:
        type:
          type: string
          const: provider_json
        provider:
          type: string
          minLength: 1
        payload:
          $ref: "#/components/schemas/ProviderPayload"
    ProviderPayload:
      type: object
      additionalProperties: true
      required:
        - providerIntentId
        - resolverReference
        - payingDappId
        - payingDappReference
        - chain
        - network
        - asset
        - destination
        - amount
        - purpose
        - reference
        - expiresAt
      properties:
        providerIntentId:
          type: string
          minLength: 1
        resolverReference:
          type: string
          minLength: 1
        payingDappId:
          type: string
          minLength: 1
        payingDappReference:
          type: string
          minLength: 1
        chain:
          type: string
          minLength: 1
        network:
          type: string
          minLength: 1
        asset:
          type: string
          minLength: 1
        destination:
          $ref: "#/components/schemas/PaymentDestination"
        amount:
          type: string
          pattern: "^[0-9]+(\\.[0-9]+)?$"
        purpose:
          type: string
          minLength: 1
        reference:
          type: string
          minLength: 1
        expiresAt:
          type: string
          format: date-time
    PaymentDestination:
      type: object
      additionalProperties: false
      required:
        - kind
        - recipientAddress
      properties:
        kind:
          type: string
          const: blockchain_address
        recipientAddress:
          type: string
          minLength: 1
    IntentReferences:
      type: object
      additionalProperties: false
      required:
        - resolverReference
        - providerReference
        - payingDappReference
      properties:
        resolverReference:
          type: string
          minLength: 1
        providerReference:
          type: string
          minLength: 1
        payingDappReference:
          type: string
          minLength: 1
    RouteRegistrationRequest:
      type: object
      additionalProperties: false
      required:
        - recipient
        - payToDappId
        - supportedRoutes
        - authorizationToken
      properties:
        recipient:
          $ref: "#/components/schemas/Recipient"
        payToDappId:
          type: string
        supportedRoutes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RoutePath"
        authorizationToken:
          type: string
    RouteRegistrationResponse:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - status
            - routes
          properties:
            status:
              type: string
              const: resolved
            routes:
              type: array
              items:
                $ref: "#/components/schemas/PayToRoute"
        - $ref: "#/components/schemas/ActionRequiredResponse"
        - type: object
          additionalProperties: false
          required:
            - status
          properties:
            status:
              type: string
              enum:
                - no_route
                - provider_unavailable
    PayToRoute:
      type: object
      additionalProperties: false
      required:
        - id
        - payToDappId
        - chain
        - network
        - asset
        - state
      properties:
        id:
          type: string
          minLength: 1
        payToDappId:
          type: string
          minLength: 1
        chain:
          type: string
          minLength: 1
        network:
          type: string
          minLength: 1
        asset:
          type: string
          minLength: 1
        state:
          type: string
          enum:
            - active
            - disabled
            - revoked
    RouteListResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - routes
      properties:
        status:
          type: string
          const: resolved
        routes:
          type: array
          items:
            $ref: "#/components/schemas/PayToRoute"
    RouteReadResponse:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - status
            - route
          properties:
            status:
              type: string
              const: resolved
            route:
              $ref: "#/components/schemas/PayToRoute"
        - $ref: "#/components/schemas/StatusOnlyResponse"
    RouteUpdateRequest:
      type: object
      additionalProperties: false
      anyOf:
        - required:
            - state
        - required:
            - supportedRoutes
      properties:
        state:
          type: string
          enum:
            - active
            - disabled
            - revoked
        supportedRoutes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RoutePath"
    RouteDeleteResponse:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - status
            - routeId
          properties:
            status:
              type: string
              const: revoked
            routeId:
              type: string
              minLength: 1
        - $ref: "#/components/schemas/StatusOnlyResponse"
    HostedActionView:
      type: object
      additionalProperties: false
      required:
        - status
        - actionId
        - actionType
      properties:
        status:
          type: string
          enum:
            - ready
            - expired
            - invalid
            - completed
            - restart_required
        actionId:
          type: string
        actionType:
          type: string
          enum:
            - route_selection
        options:
          type: array
          items:
            $ref: "#/components/schemas/RouteOption"
    RouteOption:
      type: object
      additionalProperties: false
      required:
        - optionId
        - chain
        - network
        - asset
        - payToDappId
        - displayName
      properties:
        optionId:
          type: string
        chain:
          type: string
        network:
          type: string
        asset:
          type: string
        payToDappId:
          type: string
        displayName:
          type: string
    HostedActionDecision:
      type: object
      additionalProperties: false
      required:
        - decision
      properties:
        decision:
          type: string
          enum:
            - approve
            - deny
            - select_route
        selectedOptionId:
          type: string
    HostedActionCompletion:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - approved
            - denied
            - selected_route
            - completed
            - restart_required
    ProviderCallbackRequest:
      type: object
      additionalProperties: false
      required:
        - resolverRequestId
        - recipient
        - payingDappId
        - payingDappReference
        - selectedPath
        - amount
        - purpose
        - expiresAt
      properties:
        resolverRequestId:
          type: string
        recipient:
          $ref: "#/components/schemas/RecipientAlias"
        payingDappId:
          type: string
        payingDappReference:
          type: string
        selectedPath:
          $ref: "#/components/schemas/RoutePath"
        amount:
          $ref: "#/components/schemas/Amount"
        purpose:
          type: string
        expiresAt:
          type: string
          format: date-time
    ProviderResponse:
      type: object
      additionalProperties: false
      required:
        - providerIntentId
        - status
        - paymentInstruction
      properties:
        providerIntentId:
          type: string
          minLength: 1
        status:
          type: string
          const: ready
        paymentInstruction:
          $ref: "#/components/schemas/PaymentInstruction"
    NotificationEvent:
      type: object
      additionalProperties: false
      required:
        - eventType
        - schema
        - recipient
        - amount
        - references
        - action
      properties:
        eventType:
          type: string
          const: payment_intent_created
        schema:
          type: string
          const: mypaytag.notification.v1
        recipient:
          type: object
          additionalProperties: false
          required:
            - identifierType
            - maskedDisplay
          properties:
            identifierType:
              type: string
              const: paytag
            maskedDisplay:
              type: string
              minLength: 1
        amount:
          $ref: "#/components/schemas/Amount"
        references:
          type: object
          additionalProperties: false
          required:
            - resolverReference
            - providerReference
            - payingDappReference
          properties:
            resolverReference:
              type: string
              minLength: 1
            providerReference:
              type: string
              minLength: 1
            payingDappReference:
              type: string
              minLength: 1
        action:
          type: object
          additionalProperties: false
          required:
            - type
          properties:
            type:
              type: string
              const: none
    NotificationAccepted:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          const: accepted
    SolverId:
      type: string
      enum:
        - lifi
        - squid
        - zero_x_cross_chain
        - across
        - layerzero_stargate
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/PublicStatus"
        message:
          type: string
          description: Safe public message only.
